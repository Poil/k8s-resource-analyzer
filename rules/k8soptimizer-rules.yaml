---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    release: {{ .Release.Name }}
    app: prometheus-operator
  name: pod.rules
spec:
  groups:
  # ===============================================================
  # GROUP 1: Standard Workloads (1m interval)
  # Excludes gitlab-runner to prevent cardinality explosion
  # ===============================================================
  - name: pod-record.rules
    interval: 1m
    rules:
    # --- Standard CPU Usage ---
    - record: kube_workload_container_resource_usage_cpu_cores_min
      expr: min(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace!="gitlab-runner"} * on(cluster, namespace, pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (cluster, namespace, pod, workload, workload_type)) by (cluster, namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_cpu_cores_avg
      expr: avg(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace!="gitlab-runner"} * on(cluster, namespace, pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (cluster, namespace, pod, workload, workload_type)) by (cluster, namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_cpu_cores_max
      expr: max(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace!="gitlab-runner"} * on(cluster, namespace, pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (cluster, namespace, pod, workload, workload_type)) by (cluster, namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_cpu_cores_sum
      expr: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace!="gitlab-runner"} * on(cluster, namespace, pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (cluster, namespace, pod, workload, workload_type)) by (cluster, namespace, workload, workload_type, container)

    # --- Standard Memory Usage ---
    - record: kube_workload_container_resource_usage_memory_bytes_min
      expr: min(container_memory_working_set_bytes{namespace!="gitlab-runner"} * on(cluster, namespace, pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (cluster, namespace, pod, workload, workload_type)) by (cluster, namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_memory_bytes_avg
      expr: avg(container_memory_working_set_bytes{namespace!="gitlab-runner"} * on(cluster, namespace, pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (cluster, namespace, pod, workload, workload_type)) by (cluster, namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_memory_bytes_max
      expr: max(container_memory_working_set_bytes{namespace!="gitlab-runner"} * on(cluster, namespace, pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (cluster, namespace, pod, workload, workload_type)) by (cluster, namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_memory_bytes_sum
      expr: sum(container_memory_working_set_bytes{namespace!="gitlab-runner"} * on(cluster, namespace, pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (cluster, namespace, pod, workload, workload_type)) by (cluster, namespace, workload, workload_type, container)

    # --- Standard Stability & Specs ---
    - record: kube_workload_container_resource_usage_memory_oom_killed
      expr: sum(kube_pod_container_status_terminated_reason{job="kube-state-metrics", reason="OOMKilled", namespace!="gitlab-runner"} * on(cluster, namespace, pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (cluster, namespace, pod, workload, workload_type)) by (cluster, namespace, workload, workload_type, container)

    - record: kube_workload_container_resource_requests
      expr: |
        max by (cluster, namespace, workload, container, resource) (
          kube_pod_container_resource_requests{namespace!="gitlab-runner"}
          * on(cluster, namespace, pod) group_left(workload)
          max by (cluster, namespace, pod, workload) (namespace_workload_pod:kube_pod_owner:relabel{})
        )
    - record: kube_workload_container_resource_limits
      expr: |
        max by (cluster, namespace, workload, container, resource) (
          kube_pod_container_resource_limits{namespace!="gitlab-runner"}
          * on(cluster, namespace, pod) group_left(workload)
          max by (cluster, namespace, pod, workload) (namespace_workload_pod:kube_pod_owner:relabel{})
        )

  # ===============================================================
  # GROUP 2: CI/CD GitLab Runner Metrics (1m interval)
  # ===============================================================
  - name: gitlab-runner-record.rules
    interval: 1m
    rules:
    # --- GitLab CPU Usage ---
    - record: gitlab_job_container_resource_usage_cpu_cores_min
      expr: |
        min by (cluster, namespace, label_gitlab_project, label_gitlab_job_name, container) (
          node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace="gitlab-runner"}
          * on(cluster, namespace, pod) group_left(label_gitlab_project, label_gitlab_job_name) kube_pod_labels{label_gitlab_job_name!="", job="kube-state-metrics"}
        )
    - record: gitlab_job_container_resource_usage_cpu_cores_avg
      expr: |
        avg by (cluster, namespace, label_gitlab_project, label_gitlab_job_name, container) (
          node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace="gitlab-runner"}
          * on(cluster, namespace, pod) group_left(label_gitlab_project, label_gitlab_job_name) kube_pod_labels{label_gitlab_job_name!="", job="kube-state-metrics"}
        )
    - record: gitlab_job_container_resource_usage_cpu_cores_max
      expr: |
        max by (cluster, namespace, label_gitlab_project, label_gitlab_job_name, container) (
          node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace="gitlab-runner"}
          * on(cluster, namespace, pod) group_left(label_gitlab_project, label_gitlab_job_name) kube_pod_labels{label_gitlab_job_name!="", job="kube-state-metrics"}
        )
    - record: gitlab_job_container_resource_usage_cpu_cores_sum
      expr: |
        sum by (cluster, namespace, label_gitlab_project, label_gitlab_job_name, container) (
          node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace="gitlab-runner"}
          * on(cluster, namespace, pod) group_left(label_gitlab_project, label_gitlab_job_name) kube_pod_labels{label_gitlab_job_name!="", job="kube-state-metrics"}
        )

    # --- GitLab Memory Usage ---
    - record: gitlab_job_container_resource_usage_memory_bytes_min
      expr: |
        min by (cluster, namespace, label_gitlab_project, label_gitlab_job_name, container) (
          container_memory_working_set_bytes{namespace="gitlab-runner", container!=""}
          * on(cluster, namespace, pod) group_left(label_gitlab_project, label_gitlab_job_name) kube_pod_labels{label_gitlab_job_name!="", job="kube-state-metrics"}
        )
    - record: gitlab_job_container_resource_usage_memory_bytes_avg
      expr: |
        avg by (cluster, namespace, label_gitlab_project, label_gitlab_job_name, container) (
          container_memory_working_set_bytes{namespace="gitlab-runner", container!=""}
          * on(cluster, namespace, pod) group_left(label_gitlab_project, label_gitlab_job_name) kube_pod_labels{label_gitlab_job_name!="", job="kube-state-metrics"}
        )
    - record: gitlab_job_container_resource_usage_memory_bytes_max
      expr: |
        max by (cluster, namespace, label_gitlab_project, label_gitlab_job_name, container) (
          container_memory_working_set_bytes{namespace="gitlab-runner", container!=""}
          * on(cluster, namespace, pod) group_left(label_gitlab_project, label_gitlab_job_name) kube_pod_labels{label_gitlab_job_name!="", job="kube-state-metrics"}
        )
    - record: gitlab_job_container_resource_usage_memory_bytes_sum
      expr: |
        sum by (cluster, namespace, label_gitlab_project, label_gitlab_job_name, container) (
          container_memory_working_set_bytes{namespace="gitlab-runner", container!=""}
          * on(cluster, namespace, pod) group_left(label_gitlab_project, label_gitlab_job_name) kube_pod_labels{label_gitlab_job_name!="", job="kube-state-metrics"}
        )

    # --- GitLab Stability & Specs ---
    - record: gitlab_job_container_resource_usage_memory_oom_killed
      expr: |
        sum by (cluster, namespace, label_gitlab_project, label_gitlab_job_name, container) (
          kube_pod_container_status_terminated_reason{job="kube-state-metrics", reason="OOMKilled", namespace="gitlab-runner"}
          * on(cluster, namespace, pod) group_left(label_gitlab_project, label_gitlab_job_name) kube_pod_labels{label_gitlab_job_name!="", job="kube-state-metrics"}
        )
    - record: gitlab_job_container_resource_requests
      expr: |
        max by (cluster, namespace, label_gitlab_project, label_gitlab_job_name, container, resource) (
          (kube_pod_container_resource_requests{namespace="gitlab-runner"} * on(cluster, namespace, pod) group_left() (kube_pod_status_phase{namespace="gitlab-runner", phase="Running", job="kube-state-metrics"} == 1))
          * on(cluster, namespace, pod) group_left(label_gitlab_project, label_gitlab_job_name) kube_pod_labels{label_gitlab_job_name!="", job="kube-state-metrics"}
        )
    - record: gitlab_job_container_resource_limits
      expr: |
        max by (cluster, namespace, label_gitlab_project, label_gitlab_job_name, container, resource) (
          (kube_pod_container_resource_limits{namespace="gitlab-runner"} * on(cluster, namespace, pod) group_left() (kube_pod_status_phase{namespace="gitlab-runner", phase="Running", job="kube-state-metrics"} == 1))
          * on(cluster, namespace, pod) group_left(label_gitlab_project, label_gitlab_job_name) kube_pod_labels{label_gitlab_job_name!="", job="kube-state-metrics"}
        )

  # ===============================================================
  # GROUP 3: Historical Aggregations (1h interval)
  # Pre-calculates heavy 7-day scans for Dashboards & AI Script
  # ===============================================================
  - name: pod-historical-aggregations.rules
    interval: 1h
    rules:
    # --- Standard Workload 7-day Baselines ---
    - record: kube_workload_container_resource_usage_cpu_cores_max:1w
      expr: max_over_time(kube_workload_container_resource_usage_cpu_cores_max[1w])
    - record: kube_workload_container_resource_usage_memory_bytes_max:1w
      expr: max_over_time(kube_workload_container_resource_usage_memory_bytes_max[1w])

    # --- Standard Workload Prediction Names ---
    - record: kube_workload_container_resource_usage_cpu_cores_sum:avg_over_time_1w
      expr: avg_over_time(kube_workload_container_resource_usage_cpu_cores_sum[1w])
    - record: kube_workload_container_resource_usage_cpu_cores_sum:stddev_over_time_1w
      expr: stddev_over_time(kube_workload_container_resource_usage_cpu_cores_sum[1w])
    - record: kube_workload_container_resource_usage_memory_bytes_sum:avg_over_time_1w
      expr: avg_over_time(kube_workload_container_resource_usage_memory_bytes_sum[1w])

    # --- GitLab Job 7-day Baselines ---
    - record: gitlab_job_container_resource_usage_cpu_cores_max:1w
      expr: max_over_time(gitlab_job_container_resource_usage_cpu_cores_max[1w])
    - record: gitlab_job_container_resource_usage_memory_bytes_max:1w
      expr: max_over_time(gitlab_job_container_resource_usage_memory_bytes_max[1w])
