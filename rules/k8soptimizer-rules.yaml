---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    release: {{ .Release.Name }}
    app: prometheus-operator
  name: k8s-resource-optimizer-rules
spec:
  groups:
  # ===============================================================
  # GROUP 1: High-Frequency Metrics (1m interval)
  # Purpose: Dashboard resolution and "Latest State" tracking
  # ===============================================================
  - name: pod-record.rules
    interval: 1m
    rules:
    # --- CPU Usage Recordings ---
    - record: kube_workload_container_resource_usage_cpu_cores_min
      expr: min(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{} * on(namespace,pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (namespace, pod, workload, workload_type)) by (namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_cpu_cores_max
      expr: max(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{} * on(namespace,pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (namespace, pod, workload, workload_type)) by (namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_cpu_cores_avg
      expr: avg(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{} * on(namespace,pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (namespace, pod, workload, workload_type)) by (namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_cpu_cores_sum
      expr: sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{} * on(namespace,pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (namespace, pod, workload, workload_type)) by (namespace, workload, workload_type, container)

    # --- Memory Usage Recordings ---
    - record: kube_workload_container_resource_usage_memory_bytes_min
      expr: min(container_memory_working_set_bytes * on(namespace,pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (namespace, pod, workload, workload_type)) by (namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_memory_bytes_max
      expr: max(container_memory_working_set_bytes * on(namespace,pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (namespace, pod, workload, workload_type)) by (namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_memory_bytes_avg
      expr: avg(container_memory_working_set_bytes * on(namespace,pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (namespace, pod, workload, workload_type)) by (namespace, workload, workload_type, container)
    - record: kube_workload_container_resource_usage_memory_bytes_sum
      expr: sum(container_memory_working_set_bytes * on(namespace,pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (namespace, pod, workload, workload_type)) by (namespace, workload, workload_type, container)

    # --- Stability Metrics ---
    - record: kube_workload_container_resource_usage_memory_oom_killed
      expr: sum(kube_pod_container_status_terminated_reason{job="kube-state-metrics", reason="OOMKilled"} * on(namespace,pod) group_left(workload, workload_type) max(namespace_workload_pod:kube_pod_owner:relabel{}) by (namespace, pod, workload, workload_type)) by (namespace, workload, workload_type, container)

    # --- Latest Spec Joins (Current Request/Limits) ---
    # These stay at 1m to ensure they always reflect the latest YAML configuration
    - record: kube_workload_container_resource_requests
      expr: |
        max by (cluster, namespace, workload, container, resource) (
          kube_pod_container_resource_requests
          * on(cluster, namespace, pod) group_left(workload)
          max by (cluster, namespace, pod, workload) (namespace_workload_pod:kube_pod_owner:relabel{})
        )
    - record: kube_workload_container_resource_limits
      expr: |
        max by (cluster, namespace, workload, container, resource) (
          kube_pod_container_resource_limits
          * on(cluster, namespace, pod) group_left(workload)
          max by (cluster, namespace, pod, workload) (namespace_workload_pod:kube_pod_owner:relabel{})
        )

  # ===============================================================
  # GROUP 2: Historical Aggregations (1h interval)
  # Purpose: Pre-calculating heavy 7-day scans for AI analysis
  # ===============================================================
  - name: pod-historical-aggregations.rules
    interval: 1h
    rules:
    # --- 1-Week Rolling Maximums (Eliminates script timeouts) ---
    - record: kube_workload_container_resource_usage_cpu_cores_max:1w
      expr: max_over_time(kube_workload_container_resource_usage_cpu_cores_max[1w])

    - record: kube_workload_container_resource_usage_memory_bytes_max:1w
      expr: max_over_time(kube_workload_container_resource_usage_memory_bytes_max[1w])

    # --- Prediction & Anomaly Baselines ---
    - record: kube_workload_container_resource_usage_cpu_cores_sum:avg_over_time_1w
      expr: avg_over_time(kube_workload_container_resource_usage_cpu_cores_sum[1w])
    - record: kube_workload_container_resource_usage_cpu_cores_sum:stddev_over_time_1w
      expr: stddev_over_time(kube_workload_container_resource_usage_cpu_cores_sum[1w])

    - record: kube_workload_container_resource_usage_memory_bytes_sum:avg_over_time_1w
      expr: avg_over_time(kube_workload_container_resource_usage_memory_bytes_sum[1w])
    - record: kube_workload_container_resource_usage_memory_bytes_sum:stddev_over_time_1w
      expr: stddev_over_time(kube_workload_container_resource_usage_memory_bytes_sum[1w])
